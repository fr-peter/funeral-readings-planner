name: Desktop apps (Tauri)

# Builds native desktop installers with Tauri and publishes them as assets on a
# GitHub Release. Source-only repo: nothing built here is ever committed — the
# installers live on the Release, mirroring how deploy.yml builds the web app
# for Pages without committing dist/.
#
# Trigger by pushing a version tag, e.g.:   git tag v0.1.0 && git push origin v0.1.0
# (or run manually from the Actions tab). A *draft* Release is created so you can
# review the unsigned builds before publishing.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # tauri-action creates the Release and uploads installers

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build the Linux bundle on the OLDEST supported runner: AppImage/.deb
          # link against the build host's glibc, so an older host = wider compat.
          - platform: ubuntu-22.04
            args: ''
          # One universal (Intel + Apple Silicon) macOS .dmg.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary needs both arch targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci
        env:
          # No browsers needed in CI; only Vite + Tauri run here.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Desktop app loads the frontend from the app's own root, so build at
          # base '/' (do NOT inherit the Pages '/<repo>/' base).
          VITE_BASE: /
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Funeral Readings Planner ${{ github.ref_name }}'
          releaseBody: 'Unsigned desktop builds. On macOS, right-click the app and choose Open the first time (Gatekeeper); on Windows, click "More info" → "Run anyway" at the SmartScreen prompt.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
