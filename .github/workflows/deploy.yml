name: Deploy to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages on every push to main.
# The repository is source-only; the built site (dist/) is produced here in CI
# and never committed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          # No browsers are needed in CI; the build only uses Vite.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Build
        run: npm run build
        env:
          # Project Pages site is served under /<repo>/; build with that base so
          # asset, model, and WASM paths resolve. (A user/org site or custom
          # domain is root-served — drop this env there to build at base '/'.)
          VITE_BASE: /${{ github.event.repository.name }}/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
